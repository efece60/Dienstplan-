<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dienstplan Generator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header><h1 id="app-title">Team</h1></header>

  <main>
    <section id="team" class="tab-content active">
      <div class="card">
        <h3 id="form-title">Mitarbeiter hinzufügen</h3>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="emp-name" placeholder="z.B. Max Mustermann">
        </div>
        <div class="form-group">
          <label>Anzeige-Farbe</label>
          <input type="color" id="emp-color" value="#007bff">
        </div>
        <div class="form-group">
          <label>Fester freier Tag</label>
          <select id="emp-freeday">
            <option value="none">Keiner</option>
            <option value="1">Montag</option>
            <option value="2">Dienstag</option>
            <option value="3">Mittwoch</option>
            <option value="4">Donnerstag</option>
            <option value="5">Freitag</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Schicht-Pairing (Immer gleiche Schicht mit...)</label>
          <select id="emp-pairing">
            <option value="none">Niemandem (Standard)</option>
          </select>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="emp-sat-rule">
          <label for="emp-sat-rule">Samstags-Regelung (2 im Monat frei)</label>
        </div>

        <div id="form-buttons" style="margin-top: 1rem; display: flex; gap: 10px;">
            <button class="primary-btn" id="btn-save" onclick="handleEmployeeSave()">Speichern</button>
            <button class="primary-btn" id="btn-cancel" onclick="cancelEdit()" style="display:none; background: #666;">Abbrechen</button>
        </div>
      </div>

      <div class="card">
        <h3>Team Liste</h3>
        <div id="employee-list"></div>
      </div>
    </section>

    <section id="urlaub" class="tab-content">
      <div class="card">
        <h3>Abwesenheit eintragen</h3>
        <div class="form-group">
          <label>Mitarbeiter</label>
          <select id="abs-employee"></select>
        </div>
        <div class="form-group">
          <label>Art der Abwesenheit</label>
          <select id="abs-type">
            <option value="Urlaub">Urlaub</option>
            <option value="Wunschfrei">Wunschfrei</option>
            <option value="Krank">Krankmeldung</option>
          </select>
        </div>
        <div class="form-group">
          <label>Von (Datum)</label>
          <input type="date" id="abs-start">
        </div>
        <div class="form-group">
          <label>Bis (Datum)</label>
          <input type="date" id="abs-end">
        </div>
        <button class="primary-btn" onclick="addAbsence()" style="margin-top:1rem">Eintragen</button>
      </div>

      <div class="card">
        <h3>Geplante Abwesenheiten</h3>
        <div id="absence-list"></div>
      </div>
    </section>

    <section id="einstellungen" class="tab-content">
      <div class="card">
        <h3>Allgemein</h3>
        <div class="form-group">
          <label>Bundesland (für Feiertage)</label>
          <select id="set-state">
            <option value="BW">Baden-Württemberg</option>
            <option value="BY">Bayern</option>
            <option value="BE">Berlin</option>
            <option value="BB">Brandenburg</option>
            <option value="HB">Bremen</option>
            <option value="HH">Hamburg</option>
            <option value="HE">Hessen</option>
            <option value="MV">Mecklenburg-Vorpommern</option>
            <option value="NI">Niedersachsen</option>
            <option value="NW">Nordrhein-Westfalen</option>
            <option value="RP">Rheinland-Pfalz</option>
            <option value="SL">Saarland</option>
            <option value="SN">Sachsen</option>
            <option value="ST">Sachsen-Anhalt</option>
            <option value="SH">Schleswig-Holstein</option>
            <option value="TH">Thüringen</option>
          </select>
        </div>
      </div>

      <div class="card">
        <h3>Schichtzeiten & Besetzung</h3>
        <div class="form-group">
          <label>Frühschicht (Start - Ende)</label>
          <div style="display:flex; gap:10px;"><input type="time" id="set-frueh-start" value="06:00"><input type="time" id="set-frueh-end" value="14:00"></div>
        </div>
        <div class="form-group">
          <label>Spätschicht (Start - Ende)</label>
          <div style="display:flex; gap:10px;"><input type="time" id="set-spaet-start" value="14:00"><input type="time" id="set-spaet-end" value="22:00"></div>
        </div>
        <div class="form-group">
          <label>Samstags-Schicht (Start - Ende)</label>
          <div style="display:flex; gap:10px;"><input type="time" id="set-sa-start" value="06:00"><input type="time" id="set-sa-end" value="14:00"></div>
        </div>
        <div class="form-group">
          <label>Mindestbesetzung Spätschicht</label>
          <input type="number" id="set-min-spaet" value="2">
        </div>
        <button class="primary-btn" onclick="saveSettings()" style="margin-top:1rem">Einstellungen speichern</button>
      </div>
    </section>

    <section id="generieren" class="tab-content"><div class="card">Planungs-Logik folgt...</div></section>
    <section id="plaene" class="tab-content"><div class="card">Archiv folgt...</div></section>
  </main>

  <nav>
    <button class="nav-btn active" data-target="team">Team</button>
    <button class="nav-btn" data-target="urlaub">Urlaub</button>
    <button class="nav-btn" data-target="generieren">Planen</button>
    <button class="nav-btn" data-target="plaene">Pläne</button>
    <button class="nav-btn" data-target="einstellungen">Setup</button>
  </nav>

  <script>
    const navButtons = document.querySelectorAll('.nav-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    navButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        navButtons.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.getAttribute('data-target')).classList.add('active');
        document.getElementById('app-title').innerText = btn.innerText;
      });
    });

    let employees = JSON.parse(localStorage.getItem('team_data')) || [];
    let absences = JSON.parse(localStorage.getItem('absence_data')) || [];
    let editIndex = -1;
    
    let settings = JSON.parse(localStorage.getItem('app_settings')) || {
        state: 'NW', fruehStart: '06:00', fruehEnd: '14:00', spaetStart: '14:00', spaetEnd: '22:00', saStart: '06:00', saEnd: '14:00', minSpaet: 2
    };

    function loadSettingsToForm() {
        document.getElementById('set-state').value = settings.state;
        document.getElementById('set-frueh-start').value = settings.fruehStart;
        document.getElementById('set-frueh-end').value = settings.fruehEnd;
        document.getElementById('set-spaet-start').value = settings.spaetStart;
        document.getElementById('set-spaet-end').value = settings.spaetEnd;
        document.getElementById('set-sa-start').value = settings.saStart;
        document.getElementById('set-sa-end').value = settings.saEnd;
        document.getElementById('set-min-spaet').value = settings.minSpaet;
    }

    function saveSettings() {
        settings = {
            state: document.getElementById('set-state').value,
            fruehStart: document.getElementById('set-frueh-start').value,
            fruehEnd: document.getElementById('set-frueh-end').value,
            spaetStart: document.getElementById('set-spaet-start').value,
            spaetEnd: document.getElementById('set-spaet-end').value,
            saStart: document.getElementById('set-sa-start').value,
            saEnd: document.getElementById('set-sa-end').value,
            minSpaet: parseInt(document.getElementById('set-min-spaet').value) || 2
        };
        localStorage.setItem('app_settings', JSON.stringify(settings));
        alert("Einstellungen erfolgreich gespeichert!");
    }

    // --- TEAM LOGIK ---
    function renderEmployees() {
      const list = document.getElementById('employee-list');
      if(!list) return;
      list.innerHTML = '';
      employees.forEach((emp, index) => {
        const div = document.createElement('div');
        div.className = 'employee-item';
        let pairingText = emp.pairedWith && emp.pairedWith !== 'none' ? `<br><span style="font-size: 0.8rem; color: #666;">🔗 Gekoppelt mit: ${emp.pairedWith}</span>` : '';
        div.innerHTML = `<div class="employee-info"><div class="color-dot" style="background:${emp.color}; min-width: 20px;"></div><div><span><strong>${emp.name}</strong></span>${pairingText}</div></div><div style="display:flex; gap:10px;"><button onclick="editEmployee(${index})" style="background:none; border:none; color:var(--primary); font-weight:bold;">Edit</button><button class="delete-btn" onclick="deleteEmployee(${index})">Löschen</button></div>`;
        list.appendChild(div);
      });
      updateDropdowns(); 
    }

    function updateDropdowns() {
      const absSelect = document.getElementById('abs-employee');
      const pairSelect = document.getElementById('emp-pairing');
      if(absSelect) absSelect.innerHTML = '';
      if(pairSelect) {
          pairSelect.innerHTML = '<option value="none">Niemandem (Standard)</option>';
          employees.forEach((emp) => {
            const pairOption = document.createElement('option');
            pairOption.value = emp.name; pairOption.text = emp.name;
            pairSelect.appendChild(pairOption);
          });
      }
      if(absSelect) {
          employees.forEach((emp) => {
            const absOption = document.createElement('option');
            absOption.value = emp.name; absOption.text = emp.name;
            absSelect.appendChild(absOption);
          });
      }
    }

    function handleEmployeeSave() {
      const name = document.getElementById('emp-name').value;
      const color = document.getElementById('emp-color').value;
      const freeday = document.getElementById('emp-freeday').value;
      const pairedWith = document.getElementById('emp-pairing').value;
      const satRule = document.getElementById('emp-sat-rule').checked;
      if(!name) return alert("Bitte Namen eingeben");
      const empData = { name, color, freeday, pairedWith, satRule };
      if(editIndex === -1) { employees.push(empData); } 
      else { 
          const oldName = employees[editIndex].name;
          if(oldName !== name) { employees.forEach(e => { if(e.pairedWith === oldName) e.pairedWith = name; }); }
          employees[editIndex] = empData; cancelEdit(); 
      }
      localStorage.setItem('team_data', JSON.stringify(employees));
      renderEmployees(); clearForm();
    }

    function editEmployee(index) {
        editIndex = index;
        const emp = employees[index];
        document.getElementById('emp-name').value = emp.name;
        document.getElementById('emp-color').value = emp.color;
        document.getElementById('emp-freeday').value = emp.freeday;
        document.getElementById('emp-pairing').value = emp.pairedWith || 'none';
        document.getElementById('emp-sat-rule').checked = emp.satRule;
        document.getElementById('form-title').innerText = "Mitarbeiter bearbeiten";
        document.getElementById('btn-save').innerText = "Änderung übernehmen";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        editIndex = -1;
        document.getElementById('form-title').innerText = "Mitarbeiter hinzufügen";
        document.getElementById('btn-save').innerText = "Speichern";
        document.getElementById('btn-cancel').style.display = "none";
        clearForm();
    }

    function clearForm() {
        document.getElementById('emp-name').value = '';
        document.getElementById('emp-pairing').value = 'none';
        document.getElementById('emp-sat-rule').checked = false;
        document.getElementById('emp-freeday').value = 'none';
    }

    function deleteEmployee(index) {
      if(confirm("Mitarbeiter wirklich löschen?")) {
        const deletedName = employees[index].name;
        employees.splice(index, 1);
        employees.forEach(emp => { if(emp.pairedWith === deletedName) emp.pairedWith = 'none'; });
        localStorage.setItem('team_data', JSON.stringify(employees));
        renderEmployees();
      }
    }

    // --- URLAUB LOGIK ---
    function renderAbsences() {
      const list = document.getElementById('absence-list');
      if(!list) return;
      list.innerHTML = '';
      absences.sort((a, b) => new Date(a.start) - new Date(b.start));
      absences.forEach((abs, index) => {
        const div = document.createElement('div');
        div.className = 'employee-item'; 
        const startDate = new Date(abs.start).toLocaleDateString('de-DE');
        const endDate = new Date(abs.end).toLocaleDateString('de-DE');
        const dateString = abs.start === abs.end ? startDate : `${startDate} - ${endDate}`;
        div.innerHTML = `<div class="employee-info" style="flex-direction: column; align-items: flex-start;"><strong>${abs.employeeName} (${abs.type})</strong><span style="font-size: 0.85rem; color: #666;">${dateString}</span></div><button class="delete-btn" onclick="deleteAbsence(${index})">Löschen</button>`;
        list.appendChild(div);
      });
    }

    function addAbsence() {
      const employeeName = document.getElementById('abs-employee').value;
      const type = document.getElementById('abs-type').value;
      const start = document.getElementById('abs-start').value;
      const end = document.getElementById('abs-end').value || start; 
      if(!employeeName) return alert("Bitte erst Mitarbeiter anlegen!");
      if(!start) return alert("Bitte Startdatum auswählen!");
      absences.push({ employeeName, type, start, end });
      localStorage.setItem('absence_data', JSON.stringify(absences));
      renderAbsences();
      alert('Erfolgreich eingetragen!');
    }

    function deleteAbsence(index) {
      if(confirm("Diesen Eintrag wirklich löschen?")) {
        absences.splice(index, 1);
        localStorage.setItem('absence_data', JSON.stringify(absences));
        renderAbsences();
      }
    }

    // Start
    renderEmployees();
    renderAbsences();
    loadSettingsToForm();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
