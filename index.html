<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dienstplan Generator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Zusätzliche Styles für den Plan */
    .plan-table { border-collapse: collapse; width: 100%; min-width: 600px; font-size: 0.85rem; }
    .plan-table th, .plan-table td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    .plan-table th { background: #eee; position: sticky; top: 0; }
    .cell-frueh { background-color: #d4edda; color: #155724; font-weight: bold; }
    .cell-spaet { background-color: #cce5ff; color: #004085; font-weight: bold; }
    .cell-frei { background-color: #e2e3e5; color: #383d41; }
    .cell-urlaub { background-color: #fff3cd; color: #856404; font-style: italic; }
    .cell-krank { background-color: #f8d7da; color: #721c24; font-weight: bold; }
    .cell-we { background-color: #f8f9fa; }
    .table-container { overflow-x: auto; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; }
  </style>
</head>
<body>

  <header><h1 id="app-title">Team</h1></header>

  <main>
    <section id="team" class="tab-content active">
      <div class="card">
        <h3 id="form-title">Mitarbeiter hinzufügen</h3>
        <div class="form-group"><label>Name</label><input type="text" id="emp-name"></div>
        <div class="form-group"><label>Farbe</label><input type="color" id="emp-color" value="#007bff"></div>
        <div class="form-group">
          <label>Fester freier Tag</label>
          <select id="emp-freeday">
            <option value="none">Keiner</option><option value="1">Montag</option><option value="2">Dienstag</option>
            <option value="3">Mittwoch</option><option value="4">Donnerstag</option><option value="5">Freitag</option>
          </select>
        </div>
        <div class="form-group">
          <label>Schicht-Pairing</label>
          <select id="emp-pairing"><option value="none">Niemandem</option></select>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="emp-sat-rule"><label for="emp-sat-rule">Samstags-Regelung (2 im Monat frei)</label>
        </div>
        <div id="form-buttons" style="margin-top: 1rem; display: flex; gap: 10px;">
            <button class="primary-btn" id="btn-save" onclick="handleEmployeeSave()">Speichern</button>
            <button class="primary-btn" id="btn-cancel" onclick="cancelEdit()" style="display:none; background: #666;">Abbrechen</button>
        </div>
      </div>
      <div class="card"><h3>Team Liste</h3><div id="employee-list"></div></div>
    </section>

    <section id="urlaub" class="tab-content">
      <div class="card">
        <h3>Abwesenheit eintragen</h3>
        <div class="form-group"><label>Mitarbeiter</label><select id="abs-employee"></select></div>
        <div class="form-group"><label>Art</label><select id="abs-type"><option value="Urlaub">Urlaub</option><option value="Wunschfrei">Wunschfrei</option><option value="Krank">Krankmeldung</option></select></div>
        <div class="form-group"><label>Von</label><input type="date" id="abs-start"></div>
        <div class="form-group"><label>Bis</label><input type="date" id="abs-end"></div>
        <button class="primary-btn" onclick="addAbsence()" style="margin-top:1rem">Eintragen</button>
      </div>
      <div class="card"><h3>Geplante Abwesenheiten</h3><div id="absence-list"></div></div>
    </section>

    <section id="generieren" class="tab-content">
      <div class="card">
        <h3>Dienstplan erstellen</h3>
        <div class="form-group">
          <label>Monat auswählen</label>
          <input type="month" id="plan-month">
        </div>
        <button class="primary-btn" onclick="startGeneration()">Plan berechnen</button>
        <div id="plan-error" style="color: var(--danger); margin-top: 10px; font-weight: bold; display:none;"></div>
      </div>

      <div id="plan-result-container" style="display:none;">
        <div class="card">
            <h3>Dienstplan Entwurf</h3>
            <div class="table-container" id="plan-table-wrapper"></div>
        </div>
        <div class="card">
            <h3>Stundenübersicht (Soll / Ist)</h3>
            <div class="table-container" id="hours-table-wrapper"></div>
        </div>
      </div>
    </section>

    <section id="einstellungen" class="tab-content">
      <div class="card">
        <h3>Allgemein</h3>
        <div class="form-group">
          <label>Bundesland</label>
          <select id="set-state"><option value="NW">Nordrhein-Westfalen</option><option value="BY">Bayern</option><option value="BE">Berlin</option></select>
        </div>
      </div>
      <div class="card">
        <h3>Schichtzeiten</h3>
        <div class="form-group"><label>Frühschicht</label><div style="display:flex; gap:10px;"><input type="time" id="set-frueh-start"><input type="time" id="set-frueh-end"></div></div>
        <div class="form-group"><label>Spätschicht</label><div style="display:flex; gap:10px;"><input type="time" id="set-spaet-start"><input type="time" id="set-spaet-end"></div></div>
        <div class="form-group"><label>Samstag</label><div style="display:flex; gap:10px;"><input type="time" id="set-sa-start"><input type="time" id="set-sa-end"></div></div>
        <div class="form-group"><label>Min. Spätschicht</label><input type="number" id="set-min-spaet"></div>
      </div>
      <div class="card">
        <h3>Stundenberechnung (Soll / Ist)</h3>
        <div class="form-group"><label>Mo-Fr anwesend</label><div style="display:flex; gap:10px;"><input type="number" step="0.1" id="h-mofr-work-soll"><input type="number" step="0.1" id="h-mofr-work-ist"></div></div>
        <div class="form-group"><label>Mo-Fr abwesend (Wunschfrei)</label><div style="display:flex; gap:10px;"><input type="number" step="0.1" id="h-mofr-frei-soll"><input type="number" step="0.1" id="h-mofr-frei-ist"></div></div>
        <div class="form-group"><label>Sa anwesend</label><div style="display:flex; gap:10px;"><input type="number" step="0.1" id="h-sa-work-soll"><input type="number" step="0.1" id="h-sa-work-ist"></div></div>
        <div class="form-group"><label>Sa abwesend (Wunschfrei)</label><div style="display:flex; gap:10px;"><input type="number" step="0.1" id="h-sa-frei-soll"><input type="number" step="0.1" id="h-sa-frei-ist"></div></div>
        <button class="primary-btn" onclick="saveSettings()" style="margin-top:1rem">Speichern</button>
      </div>
    </section>
    <section id="plaene" class="tab-content"><div class="card">Archiv folgt im nächsten Schritt...</div></section>
  </main>

  <nav>
    <button class="nav-btn active" data-target="team">Team</button><button class="nav-btn" data-target="urlaub">Urlaub</button>
    <button class="nav-btn" data-target="generieren">Planen</button><button class="nav-btn" data-target="plaene">Pläne</button>
    <button class="nav-btn" data-target="einstellungen">Setup</button>
  </nav>

  <script>
    // --- GRUNDLAGEN (Nav & Daten) ---
    const navButtons = document.querySelectorAll('.nav-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    navButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        navButtons.forEach(b => b.classList.remove('active')); tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(btn.getAttribute('data-target')).classList.add('active');
        document.getElementById('app-title').innerText = btn.innerText;
      });
    });

    let employees = JSON.parse(localStorage.getItem('team_data')) || [];
    let absences = JSON.parse(localStorage.getItem('absence_data')) || [];
    let editIndex = -1;
    let settings = JSON.parse(localStorage.getItem('app_settings')) || {};
    
    // Default Settings Init
    if(!settings.h) settings.h = {
        mofr_work_soll: 8, mofr_work_ist: 8, mofr_frei_soll: 8, mofr_frei_ist: 0,
        sa_work_soll: 0, sa_work_ist: 8, sa_frei_soll: 0, sa_frei_ist: 0
    };
    if(!settings.fruehStart) {
        settings = {...settings, state: 'NW', fruehStart: '06:00', fruehEnd: '14:00', spaetStart: '14:00', spaetEnd: '22:00', saStart: '06:00', saEnd: '14:00', minSpaet: 2};
    }

    // (Hier ist der verkürzte Code für Team/Urlaub/Setup, damit die Datei nicht platzt)
    function renderEmployees() {
      const list = document.getElementById('employee-list'); if(!list) return; list.innerHTML = '';
      employees.forEach((emp, index) => {
        let pTxt = emp.pairedWith && emp.pairedWith !== 'none' ? `<br><span style="font-size:0.8rem;color:#666;">🔗 Mit: ${emp.pairedWith}</span>` : '';
        list.innerHTML += `<div class="employee-item"><div class="employee-info"><div class="color-dot" style="background:${emp.color};"></div><div><strong>${emp.name}</strong>${pTxt}</div></div><div><button onclick="editEmployee(${index})" style="background:none;border:none;color:var(--primary);font-weight:bold;margin-right:10px;">Edit</button><button class="delete-btn" onclick="deleteEmployee(${index})">X</button></div></div>`;
      });
      updateDropdowns();
    }
    function updateDropdowns() {
      const absS = document.getElementById('abs-employee'), pairS = document.getElementById('emp-pairing');
      if(absS) absS.innerHTML = ''; if(pairS) pairS.innerHTML = '<option value="none">Niemandem</option>';
      employees.forEach(emp => {
        if(pairS) pairS.innerHTML += `<option value="${emp.name}">${emp.name}</option>`;
        if(absS) absS.innerHTML += `<option value="${emp.name}">${emp.name}</option>`;
      });
    }
    function handleEmployeeSave() {
      const name = document.getElementById('emp-name').value;
      if(!name) return alert("Name fehlt");
      const data = { name, color: document.getElementById('emp-color').value, freeday: document.getElementById('emp-freeday').value, pairedWith: document.getElementById('emp-pairing').value, satRule: document.getElementById('emp-sat-rule').checked };
      if(editIndex === -1) employees.push(data); else { employees[editIndex] = data; cancelEdit(); }
      localStorage.setItem('team_data', JSON.stringify(employees)); renderEmployees(); document.getElementById('emp-name').value = '';
    }
    function editEmployee(i) { editIndex = i; const e = employees[i]; document.getElementById('emp-name').value = e.name; document.getElementById('emp-color').value = e.color; document.getElementById('emp-freeday').value = e.freeday; document.getElementById('emp-pairing').value = e.pairedWith||'none'; document.getElementById('emp-sat-rule').checked = e.satRule; document.getElementById('btn-save').innerText = "Update"; document.getElementById('btn-cancel').style.display="block"; window.scrollTo(0,0);}
    function cancelEdit() { editIndex = -1; document.getElementById('btn-save').innerText = "Speichern"; document.getElementById('btn-cancel').style.display="none"; document.getElementById('emp-name').value = '';}
    function deleteEmployee(i) { if(confirm("Löschen?")) { employees.splice(i,1); localStorage.setItem('team_data', JSON.stringify(employees)); renderEmployees(); } }

    function renderAbsences() {
      const list = document.getElementById('absence-list'); if(!list) return; list.innerHTML = '';
      absences.forEach((abs, i) => { list.innerHTML += `<div class="employee-item"><div class="employee-info"><strong>${abs.employeeName} (${abs.type})</strong><br><small>${abs.start} bis ${abs.end}</small></div><button class="delete-btn" onclick="deleteAbsence(${i})">X</button></div>`; });
    }
    function addAbsence() {
      const emp = document.getElementById('abs-employee').value, type = document.getElementById('abs-type').value, start = document.getElementById('abs-start').value, end = document.getElementById('abs-end').value || start;
      if(!emp || !start) return alert("Fehlerhafte Eingabe");
      absences.push({employeeName: emp, type, start, end}); localStorage.setItem('absence_data', JSON.stringify(absences)); renderAbsences(); alert("Eingetragen!");
    }
    function deleteAbsence(i) { absences.splice(i,1); localStorage.setItem('absence_data', JSON.stringify(absences)); renderAbsences(); }

    function loadSettingsToForm() {
        document.getElementById('set-frueh-start').value = settings.fruehStart; document.getElementById('set-frueh-end').value = settings.fruehEnd; document.getElementById('set-spaet-start').value = settings.spaetStart; document.getElementById('set-spaet-end').value = settings.spaetEnd; document.getElementById('set-sa-start').value = settings.saStart; document.getElementById('set-sa-end').value = settings.saEnd; document.getElementById('set-min-spaet').value = settings.minSpaet;
        document.getElementById('h-mofr-work-soll').value = settings.h.mofr_work_soll; document.getElementById('h-mofr-work-ist').value = settings.h.mofr_work_ist; document.getElementById('h-mofr-frei-soll').value = settings.h.mofr_frei_soll; document.getElementById('h-mofr-frei-ist').value = settings.h.mofr_frei_ist; document.getElementById('h-sa-work-soll').value = settings.h.sa_work_soll; document.getElementById('h-sa-work-ist').value = settings.h.sa_work_ist; document.getElementById('h-sa-frei-soll').value = settings.h.sa_frei_soll; document.getElementById('h-sa-frei-ist').value = settings.h.sa_frei_ist;
    }
    function saveSettings() {
        settings.fruehStart = document.getElementById('set-frueh-start').value; settings.spaetStart = document.getElementById('set-spaet-start').value; settings.minSpaet = parseInt(document.getElementById('set-min-spaet').value);
        settings.h.mofr_work_soll = parseFloat(document.getElementById('h-mofr-work-soll').value); settings.h.mofr_work_ist = parseFloat(document.getElementById('h-mofr-work-ist').value);
        settings.h.mofr_frei_soll = parseFloat(document.getElementById('h-mofr-frei-soll').value); settings.h.mofr_frei_ist = parseFloat(document.getElementById('h-mofr-frei-ist').value);
        settings.h.sa_work_soll = parseFloat(document.getElementById('h-sa-work-soll').value); settings.h.sa_work_ist = parseFloat(document.getElementById('h-sa-work-ist').value);
        localStorage.setItem('app_settings', JSON.stringify(settings)); alert("Gespeichert!");
    }


    // ==========================================
    // DAS GEHIRN: DIENSTPLAN ALGORITHMUS
    // ==========================================

    function getISOWeek(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
    }

    function isDateInAbsence(dateStr, empName) {
        const d = new Date(dateStr);
        for(let abs of absences) {
            if(abs.employeeName === empName) {
                const s = new Date(abs.start), e = new Date(abs.end);
                if(d >= s && d <= e) return abs.type; // 'Urlaub', 'Krank', 'Wunschfrei'
            }
        }
        return false;
    }

    function startGeneration() {
        const monthVal = document.getElementById('plan-month').value;
        const errDiv = document.getElementById('plan-error');
        if(!monthVal) { errDiv.innerText = "Bitte wähle zuerst einen Monat aus!"; errDiv.style.display="block"; return; }
        if(employees.length === 0) { errDiv.innerText = "Keine Mitarbeiter angelegt!"; errDiv.style.display="block"; return; }
        errDiv.style.display="none";

        const [year, month] = monthVal.split('-');
        const daysInMonth = new Date(year, month, 0).getDate();
        
        let planData = {}; // Speichert den generierten Plan
        let hoursData = {}; // Speichert Soll/Ist
        
        // Initialisiere Daten pro Mitarbeiter
        employees.forEach(emp => {
            planData[emp.name] = [];
            hoursData[emp.name] = { soll: 0, ist: 0 };
        });

        // 1. Tag für Tag durchgehen
        for(let day = 1; day <= daysInMonth; day++) {
            const currentDate = new Date(year, month - 1, day);
            const dateStr = `${year}-${month}-${String(day).padStart(2,'0')}`;
            const dayOfWeek = currentDate.getDay(); // 0=So, 1=Mo... 6=Sa
            const weekNumber = getISOWeek(currentDate);

            let availableToday = [];

            // A) Abwesenheiten und feste freie Tage prüfen
            employees.forEach(emp => {
                let shift = "";
                let absType = isDateInAbsence(dateStr, emp.name);
                
                if(dayOfWeek === 0) {
                    shift = "Frei (So)"; // Sonntag immer frei im Einzelhandel (vereinfacht)
                } else if(absType) {
                    shift = absType; // Urlaub, Krank, Wunschfrei
                } else if (emp.freeday == dayOfWeek) {
                    shift = "Frei (Fest)";
                } else {
                    availableToday.push(emp);
                }

                planData[emp.name].push({ date: dateStr, dayOfWeek, shift, weekNumber });
            });

            // B) Schichten zuteilen (Nur für Werktage Mo-Sa)
            if(dayOfWeek !== 0) {
                
                // Warnung bei Unterbesetzung (Kleiner als Mindestbesetzung Spät + 1 Früh)
                if(availableToday.length < (parseInt(settings.minSpaet) + 1)) {
                    errDiv.innerText = `Achtung: Am ${day}.${month}. sind zu wenig Mitarbeiter da (nur ${availableToday.length})!`;
                    errDiv.style.display = "block";
                }

                // Zuweisung
                availableToday.forEach(emp => {
                    let assignedShift = "";
                    
                    if(dayOfWeek === 6) {
                        // SAMSTAG: Alle arbeiten Früh
                        assignedShift = "F"; 
                    } else {
                        // MO-FR: Wöchentlicher Wechsel
                        // Wir nutzen die Kalenderwoche (gerade/ungerade), um zu wechseln
                        // Pairing berücksichtigen: Wenn Name Länge gerade ist -> Gruppe A, sonst B (Simpler Trick für Verteilung)
                        // Besser: Wir bilden einen Hash aus dem Namen (oder dem Pairing-Namen)
                        let groupHashStr = (emp.pairedWith !== 'none') ? emp.pairedWith : emp.name;
                        let isGroupA = groupHashStr.charCodeAt(0) % 2 === 0;

                        if (weekNumber % 2 === 0) {
                            assignedShift = isGroupA ? "F" : "S";
                        } else {
                            assignedShift = isGroupA ? "S" : "F";
                        }
                    }

                    // Finde den Eintrag und update ihn
                    let dayEntry = planData[emp.name].find(d => d.date === dateStr);
                    if(dayEntry) dayEntry.shift = assignedShift;
                });
            }
        }

        // 2. Stunden berechnen
        employees.forEach(emp => {
            planData[emp.name].forEach(day => {
                const s = day.shift;
                const isSa = day.dayOfWeek === 6;
                const isWd = day.dayOfWeek >= 1 && day.dayOfWeek <= 5;

                if(isWd) {
                    if(s === 'F' || s === 'S') { hoursData[emp.name].soll += settings.h.mofr_work_soll; hoursData[emp.name].ist += settings.h.mofr_work_ist; }
                    else if(s === 'Urlaub' || s === 'Krank') { hoursData[emp.name].soll += 8; hoursData[emp.name].ist += 8; } // Fest verdrahtet!
                    else { hoursData[emp.name].soll += settings.h.mofr_frei_soll; hoursData[emp.name].ist += settings.h.mofr_frei_ist; } // Wunschfrei / Fest frei
                } else if(isSa) {
                    if(s === 'F' || s === 'S') { hoursData[emp.name].soll += settings.h.sa_work_soll; hoursData[emp.name].ist += settings.h.sa_work_ist; }
                    else if(s === 'Urlaub' || s === 'Krank') { hoursData[emp.name].soll += 0; hoursData[emp.name].ist += 0; } // Fest verdrahtet!
                    else { hoursData[emp.name].soll += settings.h.sa_frei_soll; hoursData[emp.name].ist += settings.h.sa_frei_ist; }
                }
            });
        });

        renderTables(planData, hoursData, daysInMonth);
    }

    function renderTables(planData, hoursData, daysInMonth) {
        document.getElementById('plan-result-container').style.display = "block";
        const wochentage = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];

        // --- PLAN TABELLE ---
        let html = '<table class="plan-table"><thead><tr><th>Mitarbeiter</th>';
        for(let d=1; d<=daysInMonth; d++) { html += `<th>${d}.</th>`; }
        html += '</tr></thead><tbody>';

        employees.forEach(emp => {
            html += `<tr><td style="text-align:left; font-weight:bold;"><div style="display:inline-block; width:10px; height:10px; background:${emp.color}; border-radius:50%; margin-right:5px;"></div>${emp.name}</td>`;
            
            planData[emp.name].forEach(day => {
                let cssClass = "";
                let text = day.shift;
                if(text === 'F') cssClass = "cell-frueh";
                else if(text === 'S') cssClass = "cell-spaet";
                else if(text === 'Frei (So)') { cssClass = "cell-we"; text = "-"; }
                else if(text === 'Urlaub') { cssClass = "cell-urlaub"; text = "U"; }
                else if(text === 'Krank') { cssClass = "cell-krank"; text = "K"; }
                else { cssClass = "cell-frei"; text = "Frei"; }

                html += `<td class="${cssClass}">${text}</td>`;
            });
            html += '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('plan-table-wrapper').innerHTML = html;

        // --- STUNDEN TABELLE ---
        let hHtml = '<table class="plan-table" style="width:auto; min-width:300px;"><thead><tr><th>Mitarbeiter</th><th>Soll (h)</th><th>Ist (h)</th><th>Differenz</th></tr></thead><tbody>';
        employees.forEach(emp => {
            const h = hoursData[emp.name];
            const diff = h.ist - h.soll;
            const diffColor = diff < 0 ? 'color:red;' : (diff > 0 ? 'color:green;' : '');
            hHtml += `<tr><td style="text-align:left;">${emp.name}</td><td>${h.soll.toFixed(1)}</td><td>${h.ist.toFixed(1)}</td><td style="font-weight:bold; ${diffColor}">${diff > 0 ? '+'+diff.toFixed(1) : diff.toFixed(1)}</td></tr>`;
        });
        hHtml += '</tbody></table>';
        document.getElementById('hours-table-wrapper').innerHTML = hHtml;
    }

    // Start Init
    renderEmployees(); renderAbsences(); loadSettingsToForm();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
