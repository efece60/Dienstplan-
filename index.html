<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dienstplan Generator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    .plan-table { border-collapse: collapse; width: 100%; min-width: 700px; font-size: 0.85rem; margin-top: 10px; }
    .plan-table th, .plan-table td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    .plan-table th { background: #eee; position: sticky; top: 0; }
    .cell-frueh { background-color: #d4edda; color: #155724; font-weight: bold; }
    .cell-spaet { background-color: #cce5ff; color: #004085; font-weight: bold; }
    .cell-frei { background-color: #e2e3e5; color: #383d41; }
    .cell-urlaub { background-color: #fff3cd; color: #856404; font-style: italic; }
    .cell-krank { background-color: #f8d7da; color: #721c24; font-weight: bold; }
    .cell-we { background-color: #f8f9fa; color: #aaa; }
    .cell-feiertag { background-color: #ffdfba; color: #d35400; font-weight: bold; }
    .table-container { overflow-x: auto; border-radius: 5px; border: 1px solid #ddd; }
  </style>
</head>
<body>

  <header><h1 id="app-title">Team</h1></header>

  <main>
    <section id="team" class="tab-content active">
      <div class="card">
        <h3 id="form-title">Mitarbeiter hinzufügen</h3>
        <div class="form-group"><label>Name</label><input type="text" id="emp-name"></div>
        <div class="form-group"><label>Farbe</label><input type="color" id="emp-color" value="#007bff"></div>
        <div class="form-group">
          <label>Fester freier Tag</label>
          <select id="emp-freeday">
            <option value="none">Keiner</option><option value="1">Mo</option><option value="2">Di</option><option value="3">Mi</option><option value="4">Do</option><option value="5">Fr</option>
          </select>
        </div>
        <div class="form-group"><label>Partner</label><select id="emp-pairing"><option value="none">Keiner</option></select></div>
        <div class="checkbox-group"><input type="checkbox" id="emp-sat-rule" checked><label>2 Samstage frei Regel</label></div>
        <button class="primary-btn" id="btn-save" onclick="handleEmployeeSave()">Speichern</button>
        <button class="primary-btn" id="btn-cancel" onclick="cancelEdit()" style="display:none; background:#666; margin-top:5px;">Abbrechen</button>
      </div>
      <div class="card"><div id="employee-list"></div></div>
    </section>

    <section id="urlaub" class="tab-content">
      <div class="card">
        <h3>Abwesenheit</h3>
        <select id="abs-employee"></select>
        <select id="abs-type"><option value="Urlaub">Urlaub</option><option value="Wunschfrei">Wunschfrei</option><option value="Krank">Krank</option></select>
        <input type="date" id="abs-start">
        <input type="date" id="abs-end">
        <button class="primary-btn" onclick="addAbsence()" style="margin-top:10px">Eintragen</button>
      </div>
      <div class="card"><div id="absence-list"></div></div>
    </section>

    <section id="generieren" class="tab-content">
      <div class="card">
        <h3>Planen</h3>
        <input type="month" id="plan-month">
        <button class="primary-btn" onclick="startGeneration()" style="margin-top:10px">Plan berechnen</button>
        <div id="plan-error" style="display:none; color:red; margin-top:10px;"></div>
      </div>
      <div id="plan-result-container" style="display:none;">
        <div class="card"><div class="table-container" id="plan-table-wrapper"></div></div>
        <div class="card"><h3>Stunden</h3><div class="table-container" id="hours-table-wrapper"></div></div>
      </div>
    </section>

    <section id="einstellungen" class="tab-content">
      <div class="card">
        <h3>Schichten & Stunden</h3>
        <label>Mindestbesetzung Spät</label><input type="number" id="set-min-spaet" value="2">
        <hr style="margin:15px 0">
        <label>Mo-Fr: Soll-Stunden pro Tag</label><input type="number" step="0.1" id="h-mofr-soll" value="8">
        <label>Mo-Fr: Ist-Stunden bei Arbeit</label><input type="number" step="0.1" id="h-mofr-ist" value="8">
        <hr style="margin:15px 0">
        <label>Samstag: Soll-Stunden (Standard 0)</label><input type="number" step="0.1" id="h-sa-soll" value="0">
        <label>Samstag: Ist-Stunden bei Arbeit</label><input type="number" step="0.1" id="h-sa-ist" value="8">
        <button class="primary-btn" onclick="saveSettings()" style="margin-top:15px">Setup Speichern</button>
      </div>
    </section>
  </main>

  <nav>
    <button class="nav-btn active" data-target="team">Team</button>
    <button class="nav-btn" data-target="urlaub">Urlaub</button>
    <button class="nav-btn" data-target="generieren">Plan</button>
    <button class="nav-btn" data-target="einstellungen">Setup</button>
  </nav>

  <script>
    // Navigation & Speicher-Logik
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      navButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.getAttribute('data-target')).classList.add('active');
    }));

    let employees = JSON.parse(localStorage.getItem('team_data')) || [];
    let absences = JSON.parse(localStorage.getItem('absence_data')) || [];
    let settings = JSON.parse(localStorage.getItem('app_settings')) || { minSpaet: 2, hMoFrSoll: 8, hMoFrIst: 8, hSaSoll: 0, hSaIst: 8 };
    let editIndex = -1;

    function saveSettings() {
      settings = {
        minSpaet: parseInt(document.getElementById('set-min-spaet').value),
        hMoFrSoll: parseFloat(document.getElementById('h-mofr-soll').value),
        hMoFrIst: parseFloat(document.getElementById('h-mofr-ist').value),
        hSaSoll: parseFloat(document.getElementById('h-sa-soll').value),
        hSaIst: parseFloat(document.getElementById('h-sa-ist').value),
      };
      localStorage.setItem('app_settings', JSON.stringify(settings));
      alert("Gespeichert!");
    }

    function renderEmployees() {
      const list = document.getElementById('employee-list'); list.innerHTML = '';
      employees.forEach((emp, i) => {
        list.innerHTML += `<div class="employee-item"><b>${emp.name}</b> <button onclick="editEmployee(${i})">Edit</button></div>`;
      });
      const pairS = document.getElementById('emp-pairing'); pairS.innerHTML = '<option value="none">Keiner</option>';
      const absS = document.getElementById('abs-employee'); absS.innerHTML = '';
      employees.forEach(e => {
        pairS.innerHTML += `<option value="${e.name}">${e.name}</option>`;
        absS.innerHTML += `<option value="${e.name}">${e.name}</option>`;
      });
    }

    function handleEmployeeSave() {
      const data = { name: document.getElementById('emp-name').value, color: document.getElementById('emp-color').value, freeday: document.getElementById('emp-freeday').value, pairedWith: document.getElementById('emp-pairing').value, satRule: document.getElementById('emp-sat-rule').checked };
      if(editIndex === -1) employees.push(data); else employees[editIndex] = data;
      localStorage.setItem('team_data', JSON.stringify(employees)); renderEmployees(); cancelEdit();
    }
    function editEmployee(i) { editIndex = i; const e = employees[i]; document.getElementById('emp-name').value = e.name; document.getElementById('btn-cancel').style.display='block'; }
    function cancelEdit() { editIndex = -1; document.getElementById('emp-name').value = ''; document.getElementById('btn-cancel').style.display='none'; }
    function addAbsence() { absences.push({ employeeName: document.getElementById('abs-employee').value, type: document.getElementById('abs-type').value, start: document.getElementById('abs-start').value, end: document.getElementById('abs-end').value }); localStorage.setItem('absence_data', JSON.stringify(absences)); renderAbsences(); }
    function renderAbsences() { document.getElementById('absence-list').innerHTML = absences.map((a,i) => `<div>${a.employeeName}: ${a.type} <button onclick="absences.splice(${i},1);localStorage.setItem('absence_data',JSON.stringify(absences));renderAbsences()">X</button></div>`).join(''); }

    // ALGORITHMUS
    function getISOWeek(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
    }

    function startGeneration() {
      const monthVal = document.getElementById('plan-month').value;
      if(!monthVal) return;
      const [year, month] = monthVal.split('-').map(Number);
      const daysInMonth = new Date(year, month, 0).getDate();
      
      // Zeitfenster berechnen (Monatsübergreifend)
      let spanStart = new Date(year, month - 1, 1);
      spanStart.setDate(spanStart.getDate() - ((spanStart.getDay() || 7) - 1));
      let spanEnd = new Date(year, month, 0);
      spanEnd.setDate(spanEnd.getDate() + (7 - (spanEnd.getDay() || 7)));

      let plan = {};
      employees.forEach(e => plan[e.name] = []);

      let curr = new Date(spanStart);
      while(curr <= spanEnd) {
        const dStr = curr.toISOString().split('T')[0];
        const dw = curr.getDay();
        const wn = getISOWeek(curr);
        const isM = (curr.getMonth() === month - 1);

        employees.forEach(emp => {
          let status = "Work";
          let abs = absences.find(a => a.employeeName === emp.name && dStr >= a.start && dStr <= (a.end || a.start));
          if(dw === 0) status = "So";
          else if(abs) status = abs.type;
          else if(emp.freeday == dw) status = "Frei";
          
          plan[emp.name].push({ date: dStr, dw, wn, status, isM });
        });
        curr.setDate(curr.getDate() + 1);
      }

      // 5-Tage-Woche & Schichten
      let weeks = [...new Set(plan[employees[0].name].map(d => d.wn))];
      weeks.forEach(wn => {
        employees.forEach(emp => {
          let weekDays = plan[emp.name].filter(d => d.wn === wn && d.dw !== 0);
          let working = weekDays.filter(d => ["Work","Urlaub","Krank"].includes(d.status));
          
          // Samstag-Regel (vereinfacht: 2 pro Monat)
          if(emp.satRule && working.length > 5) {
             let sat = weekDays.find(d => d.dw === 6 && d.status === "Work");
             if(sat) { sat.status = "Frei"; working = weekDays.filter(d => ["Work","Urlaub","Krank"].includes(d.status)); }
          }
          // Unter der Woche frei
          if(working.length > 5) {
            let potential = weekDays.find(d => d.dw >= 1 && d.dw <= 5 && d.status === "Work");
            if(potential) potential.status = "Frei";
          }
        });
      });

      // Schicht-Zuweisung F/S
      allDates(plan).forEach(dStr => {
        let dayData = plan[employees[0].name].find(x => x.date === dStr);
        if(dayData.dw === 0 || dayData.dw === 6) {
          employees.forEach(e => { let d = plan[e.name].find(x => x.date === dStr); if(d.status === "Work") d.status = "F"; });
        } else {
          employees.forEach(e => {
            let d = plan[e.name].find(x => x.date === dStr);
            if(d.status === "Work") {
               let isA = (employees.indexOf(e) % 2 === 0);
               d.status = (dayData.wn % 2 === 0) ? (isA ? "F" : "S") : (isA ? "S" : "F");
            }
          });
        }
      });

      renderResult(plan, daysInMonth);
    }

    function allDates(plan) { return plan[employees[0].name].map(d => d.date); }

    function renderResult(plan, dim) {
      document.getElementById('plan-result-container').style.display = 'block';
      let html = '<table class="plan-table"><tr><th>Name</th>';
      for(let i=1; i<=dim; i++) html += `<th>${i}</th>`;
      html += '</tr>';

      let hHtml = '<table class="plan-table"><tr><th>Name</th><th>Soll</th><th>Ist</th><th>Diff</th></tr>';

      employees.forEach(emp => {
        let soll = 0, ist = 0;
        html += `<tr><td>${emp.name}</td>`;
        plan[emp.name].filter(d => d.isM).forEach(d => {
          let c = ""; 
          if(d.status === "F") { c="cell-frueh"; }
          else if(d.status === "S") { c="cell-spaet"; }
          else if(d.status === "Urlaub" || d.status === "Krank") { c="cell-urlaub"; }
          else { c="cell-frei"; }
          html += `<td class="${c}">${d.status}</td>`;

          // BERECHNUNG RECHTSVERBINDLICH
          if(d.dw >= 1 && d.dw <= 5) { // Mo-Fr
            soll += settings.hMoFrSoll;
            if(["F","S"].includes(d.status)) ist += settings.hMoFrIst;
            if(["Urlaub","Krank"].includes(d.status)) ist += settings.hMoFrSoll; // Lohnfortzahlung
          } else if(d.dw === 6) { // Sa
            soll += settings.hSaSoll;
            if(["F","S"].includes(d.status)) ist += settings.hSaIst;
            if(["Urlaub","Krank"].includes(d.status)) ist += settings.hSaSoll; // Meist 0
          }
        });
        html += '</tr>';
        let diff = ist - soll;
        hHtml += `<tr><td>${emp.name}</td><td>${soll}</td><td>${ist}</td><td style="color:${diff<0?'red':'green'}">${diff}</td></tr>`;
      });
      document.getElementById('plan-table-wrapper').innerHTML = html + '</table>';
      document.getElementById('hours-table-wrapper').innerHTML = hHtml + '</table>';
    }

    renderEmployees(); renderAbsences();
    document.getElementById('set-min-spaet').value = settings.minSpaet;
    document.getElementById('h-mofr-soll').value = settings.hMoFrSoll;
    document.getElementById('h-mofr-ist').value = settings.hMoFrIst;
    document.getElementById('h-sa-soll').value = settings.hSaSoll;
    document.getElementById('h-sa-ist').value = settings.hSaIst;
  </script>
</body>
</html>
