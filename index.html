<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dienstplan Generator Pro</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* DESIGN & LAYOUT */
    :root {
      --primary: #007bff;
      --bg-light: #f4f7f6;
      --text-dark: #333;
      --nav-bg: #ffffff;
      --danger: #dc3545;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { background-color: var(--bg-light); color: var(--text-dark); padding-bottom: 80px; }
    header { background-color: var(--primary); color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 10; }
    
    .tab-content { display: none; padding: 1rem; }
    .tab-content.active { display: block; }
    
    .card { background: white; padding: 1.2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1rem; }
    
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.9rem; margin-bottom: 0.4rem; font-weight: bold; }
    input[type="text"], input[type="color"], input[type="date"], input[type="month"], input[type="time"], input[type="number"], select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    
    .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 0.5rem; }
    button.primary-btn { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 8px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; }
    
    .employee-item { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem; border-bottom: 1px solid #eee; }
    .employee-info { display: flex; align-items: center; gap: 12px; }
    .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ccc; }
    .delete-btn { background: none; border: none; color: var(--danger); font-weight: bold; cursor: pointer; }
    
    nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); display: flex; border-top: 1px solid #eee; z-index: 100; }
    .nav-btn { background: none; border: none; flex: 1; padding: 1rem 0; font-size: 0.75rem; color: #888; cursor: pointer; }
    .nav-btn.active { color: var(--primary); border-top: 3px solid var(--primary); font-weight: bold; }

    .plan-table { border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
    .main-plan-table { width: 100%; min-width: 700px; }
    .hours-table { width: auto; min-width: 300px; }
    
    .plan-table th, .plan-table td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    .plan-table th { background: #eee; position: sticky; top: 0; }
    .cell-frueh { background-color: #d4edda; color: #155724; font-weight: bold; }
    .cell-spaet { background-color: #cce5ff; color: #004085; font-weight: bold; }
    .cell-frei { background-color: #e2e3e5; color: #383d41; }
    .cell-urlaub { background-color: #fff3cd; color: #856404; font-style: italic; }
    .cell-krank { background-color: #f8d7da; color: #721c24; font-weight: bold; }
    .cell-we { background-color: #f8f9fa; color: #aaa; }
    .cell-feiertag { background-color: #ffdfba; color: #d35400; font-weight: bold; }
    .table-container { overflow-x: auto; border-radius: 5px; border: 1px solid #ddd; }

    @media print {
        @page { size: landscape; margin: 10mm; }
        body { background: white; padding: 0; margin: 0; color: black; }
        header, nav, button, input, select, label, .form-group, .checkbox-group, #plan-error, h3 { display: none !important; }
        .card { box-shadow: none; border: none; padding: 0; margin: 0; background: transparent; }
        .tab-content { padding: 0; }
        .table-container { overflow: visible !important; border: none; }
        .plan-table { width: 100%; font-size: 10pt; min-width: auto; }
        .plan-table th, .plan-table td { border: 1px solid #000; padding: 4px; }
        .cell-frueh { background-color: #d4edda !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .cell-spaet { background-color: #cce5ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .cell-frei { background-color: #e2e3e5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .cell-urlaub { background-color: #fff3cd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .cell-krank { background-color: #f8d7da !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .cell-feiertag { background-color: #ffdfba !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .print-title { display: block !important; font-size: 14pt; font-weight: bold; margin-bottom: 10px; margin-top: 20px; }
    }
    .print-title { display: none; }
  </style>
</head>
<body>

  <header><h1 id="app-title">Planen</h1></header>

  <main>
    <section id="team" class="tab-content">
      <div class="card">
        <h3 id="form-title">Mitarbeiter hinzufügen</h3>
        <div class="form-group"><label>Name</label><input type="text" id="emp-name" placeholder="Name"></div>
        <div class="form-group"><label>Anzeige-Farbe</label><input type="color" id="emp-color" value="#007bff"></div>
        <div class="form-group"><label>Fester freier Tag</label>
          <select id="emp-freeday">
            <option value="none">Keiner</option><option value="1">Montag</option><option value="2">Dienstag</option>
            <option value="3">Mittwoch</option><option value="4">Donnerstag</option><option value="5">Freitag</option>
          </select>
        </div>
        <div class="form-group"><label>Schicht-Pairing</label><select id="emp-pairing"><option value="none">Niemandem</option></select></div>
        <div class="checkbox-group"><input type="checkbox" id="emp-sat-rule" checked><label for="emp-sat-rule">Samstags-Regelung (2 im Monat frei)</label></div>
        <div id="form-buttons" style="margin-top: 1rem; display: flex; gap: 10px;">
            <button class="primary-btn" id="btn-save" onclick="handleEmployeeSave()">Speichern</button>
            <button class="primary-btn" id="btn-cancel" onclick="cancelEdit()" style="display:none; background: #666;">Abbrechen</button>
        </div>
      </div>
      <div class="card"><h3>Team Liste</h3><div id="employee-list"></div></div>
    </section>

    <section id="urlaub" class="tab-content">
      <div class="card">
        <h3>Abwesenheit</h3>
        <div class="form-group"><label>Mitarbeiter</label><select id="abs-employee"></select></div>
        <div class="form-group"><label>Art</label><select id="abs-type"><option value="Urlaub">Urlaub</option><option value="Wunschfrei">Wunschfrei</option><option value="Krank">Krankmeldung</option></select></div>
        <div class="form-group"><label>Von</label><input type="date" id="abs-start"></div>
        <div class="form-group"><label>Bis</label><input type="date" id="abs-end"></div>
        <button class="primary-btn" onclick="addAbsence()" style="margin-top:1rem">Eintragen</button>
      </div>
      <div class="card"><h3>Liste</h3><div id="absence-list"></div></div>
    </section>

    <section id="generieren" class="tab-content active">
      <div class="card">
        <h3>Dienstplan erstellen</h3>
        <div class="form-group"><label>Monat</label><input type="month" id="plan-month"></div>
        <button class="primary-btn" onclick="startGeneration()">Plan berechnen</button>
        <div id="plan-error" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-top: 10px; font-weight: bold; display:none;"></div>
      </div>

      <div id="plan-result-container" style="display:none;">
        <div class="print-title" id="print-title-new">Dienstplan</div>
        <div class="card"><div class="table-container" id="plan-table-wrapper"></div></div>
        <div class="card"><h3>Stundenübersicht</h3><div class="table-container" id="hours-table-wrapper"></div></div>
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="primary-btn" onclick="saveCurrentPlan()" style="background-color: #28a745;">Plan speichern</button>
            <button class="primary-btn" onclick="window.print()" style="background-color: #17a2b8;">PDF / Drucken</button>
        </div>
      </div>
    </section>

    <section id="plaene" class="tab-content">
      <div class="card"><h3>Gespeicherte Pläne</h3><div id="saved-plans-list"></div></div>
      <div id="saved-plan-view" style="display:none;">
        <div class="print-title" id="print-title-archive">Archiv</div>
        <div class="card"><h3 id="saved-plan-title">Plan</h3><div class="table-container" id="saved-plan-table-wrapper"></div></div>
        <div class="card"><h3>Stundenübersicht</h3><div class="table-container" id="saved-hours-table-wrapper"></div></div>
        <div style="display: flex; gap: 10px; margin-top: 1rem;">
            <button class="primary-btn" onclick="document.getElementById('saved-plan-view').style.display='none'; window.scrollTo(0,0);" style="background-color: #666;">Schließen</button>
            <button class="primary-btn" onclick="window.print()" style="background-color: #17a2b8;">PDF / Drucken</button>
        </div>
      </div>
    </section>

    <section id="einstellungen" class="tab-content">
      <div class="card">
        <h3>Setup</h3>
        <div class="form-group">
          <label>Bundesland</label>
          <select id="set-state">
            <option value="BW">Baden-Württemberg</option><option value="BY">Bayern</option><option value="BE">Berlin</option>
            <option value="BB">Brandenburg</option><option value="HB">Bremen</option><option value="HH">Hamburg</option>
            <option value="HE">Hessen</option><option value="MV">Mecklenburg-Vorpommern</option><option value="NI">Niedersachsen</option>
            <option value="NW" selected>Nordrhein-Westfalen</option><option value="RP">Rheinland-Pfalz</option><option value="SL">Saarland</option>
            <option value="SN">Sachsen</option><option value="ST">Sachsen-Anhalt</option><option value="SH">Schleswig-Holstein</option>
            <option value="TH">Thüringen</option>
          </select>
        </div>
        <div class="form-group"><label>Min. Spätbesetzung</label><input type="number" id="set-min-spaet" value="2"></div>
        <button class="primary-btn" onclick="saveSettings()">Speichern</button>
      </div>
    </section>
  </main>

  <nav>
    <button class="nav-btn" data-target="team">Team</button>
    <button class="nav-btn" data-target="urlaub">Urlaub</button>
    <button class="nav-btn active" data-target="generieren">Planen</button>
    <button class="nav-btn" data-target="plaene">Pläne</button>
    <button class="nav-btn" data-target="einstellungen">Setup</button>
  </nav>

  <script>
    // --- NAVIGATION ---
    const navButtons = document.querySelectorAll('.nav-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    navButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        navButtons.forEach(b => b.classList.remove('active')); tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); document.getElementById(btn.getAttribute('data-target')).classList.add('active');
        document.getElementById('app-title').innerText = btn.innerText;
      });
    });

    // --- DATEN INIT ---
    let employees = JSON.parse(localStorage.getItem('team_data')) || [];
    let absences = JSON.parse(localStorage.getItem('absence_data')) || [];
    let settings = JSON.parse(localStorage.getItem('app_settings')) || { state: 'NW', minSpaet: 2 };
    let savedPlans = JSON.parse(localStorage.getItem('saved_plans')) || {};
    let currentGeneratedPlan = null;
    let editIndex = -1;

    function saveSettings() {
        settings.state = document.getElementById('set-state').value;
        settings.minSpaet = parseInt(document.getElementById('set-min-spaet').value) || 2;
        localStorage.setItem('app_settings', JSON.stringify(settings)); alert("Gespeichert");
    }

    function renderEmployees() {
      const list = document.getElementById('employee-list'); if(!list) return; list.innerHTML = '';
      employees.forEach((emp, i) => {
        list.innerHTML += `<div class="employee-item"><div class="employee-info"><div class="color-dot" style="background:${emp.color}"></div><strong>${emp.name}</strong></div><div><button onclick="editEmployee(${i})" style="color:var(--primary);margin-right:10px;background:none;border:none;">Edit</button><button class="delete-btn" onclick="deleteEmployee(${i})">Löschen</button></div></div>`;
      });
      document.getElementById('emp-pairing').innerHTML = '<option value="none">Niemandem</option>' + employees.map(e=>`<option value="${e.name}">${e.name}</option>`).join('');
      document.getElementById('abs-employee').innerHTML = employees.map(e=>`<option value="${e.name}">${e.name}</option>`).join('');
    }

    function handleEmployeeSave() {
      const name = document.getElementById('emp-name').value; if(!name) return;
      const data = { name, color: document.getElementById('emp-color').value, freeday: document.getElementById('emp-freeday').value, pairedWith: document.getElementById('emp-pairing').value, satRule: document.getElementById('emp-sat-rule').checked };
      if(editIndex === -1) employees.push(data); else employees[editIndex] = data;
      localStorage.setItem('team_data', JSON.stringify(employees)); renderEmployees(); cancelEdit();
    }
    function editEmployee(i) { editIndex = i; const e = employees[i]; document.getElementById('emp-name').value = e.name; document.getElementById('btn-cancel').style.display="block"; }
    function cancelEdit() { editIndex = -1; document.getElementById('emp-name').value = ''; document.getElementById('btn-cancel').style.display="none"; }
    function deleteEmployee(i) { employees.splice(i,1); localStorage.setItem('team_data', JSON.stringify(employees)); renderEmployees(); }

    function renderAbsences() {
      const list = document.getElementById('absence-list'); list.innerHTML = '';
      absences.sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach((abs, i) => {
        list.innerHTML += `<div class="employee-item"><div>${abs.employeeName} (${abs.type})<br><small>${abs.start} bis ${abs.end}</small></div><button class="delete-btn" onclick="deleteAbsence(${i})">Löschen</button></div>`;
      });
    }
    function addAbsence() {
      const e = document.getElementById('abs-employee').value, s = document.getElementById('abs-start').value, en = document.getElementById('abs-end').value || s;
      if(!e || !s) return; absences.push({ employeeName:e, type:document.getElementById('abs-type').value, start:s, end:en });
      localStorage.setItem('absence_data', JSON.stringify(absences)); renderAbsences();
    }
    function deleteAbsence(i) { absences.splice(i,1); localStorage.setItem('absence_data', JSON.stringify(absences)); renderAbsences(); }

    // --- LOGIK ---
    function getISOWeek(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(),0,1))) / 86400000) + 1)/7);
    }
    function getEasterDate(y) {
        const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),n=h+l-7*m+114;
        return new Date(y, Math.floor(n / 31) - 1, (n % 31) + 1);
    }
    function getAllFeiertage(y, s) {
        const f = []; const add = (d,m) => f.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
        add(1,1); add(1,5); add(3,10); add(25,12); add(26,12);
        const e = getEasterDate(y);
        const addRel = (o) => { const r = new Date(e); r.setDate(e.getDate()+o); f.push(`${r.getFullYear()}-${String(r.getMonth()+1).padStart(2,'0')}-${String(r.getDate()).padStart(2,'0')}`); };
        addRel(-2); addRel(1); addRel(39); addRel(50);
        if(['BW','BY','NW','RP','SL','HE'].includes(s)) addRel(60);
        if(['BW','BY','NW','RP','SL'].includes(s)) add(1,11);
        return f;
    }

    function startGeneration() {
        const monthVal = document.getElementById('plan-month').value;
        if(!monthVal || employees.length === 0) return alert("Wähle Monat und lege Team an!");
        const [year, month] = monthVal.split('-').map(Number);
        const errBox = document.getElementById('plan-error'); errBox.style.display = "none";

        try {
            let feiertage = getAllFeiertage(year, settings.state).concat(getAllFeiertage(year-1, settings.state));
            let start = new Date(year, month-1, 1);
            start.setDate(start.getDate() - (start.getDay() || 7) + 1); // Montag der ersten Woche
            let end = new Date(year, month, 0);
            end.setDate(end.getDate() + (7 - (end.getDay() || 7))); // Sonntag der letzten Woche

            let timeline = {};
            employees.forEach(e => timeline[e.name] = {});

            // 1. BASIS-STATUS (Archiv, Feiertage, Abwesenheiten)
            let curr = new Date(start);
            while(curr <= end) {
                const dStr = curr.toISOString().split('T')[0];
                const dw = curr.getDay();
                employees.forEach(emp => {
                    let status = "Work";
                    // Lade Archiv von ANDEREN Monaten (für Brückenwochen)
                    for(let m in savedPlans) {
                        if(m !== monthVal && savedPlans[m].fullTimeline && savedPlans[m].fullTimeline[emp.name] && savedPlans[m].fullTimeline[emp.name][dStr]) {
                            status = savedPlans[m].fullTimeline[emp.name][dStr];
                        }
                    }
                    if(status === "Work") {
                        const isAbs = absences.find(a => a.employeeName === emp.name && dStr >= a.start && dStr <= a.end);
                        if(dw === 0) status = "Frei (So)";
                        else if(feiertage.includes(dStr)) status = "Feiertag";
                        else if(isAbs) status = isAbs.type;
                        else if(emp.freeday == dw) status = "Frei (Fest)";
                    }
                    timeline[emp.name][dStr] = status;
                });
                curr.setDate(curr.getDate() + 1);
            }

            // 2. WOCHEN-LOGIK (Eiserne 1-Frei-Regel pro Kalenderwoche)
            let weeks = [...new Set(Object.keys(timeline[employees[0].name]).map(d => getISOWeek(new Date(d))))];
            weeks.forEach(wn => {
                employees.forEach(emp => {
                    let daysOfWk = Object.keys(timeline[emp.name]).filter(d => getISOWeek(new Date(d)) === wn && new Date(d).getDay() !== 0);
                    let hasFrei = daysOfWk.some(d => ["Frei", "Frei (Fest)", "Wunschfrei", "Urlaub", "Krank"].includes(timeline[emp.name][d]));
                    
                    if(!hasFrei) {
                        // Muss ein Tag frei bekommen. Check Samstags-Kontingent im aktuellen Monat.
                        let satOfWk = daysOfWk.find(d => new Date(d).getDay() === 6);
                        let mStr = satOfWk ? satOfWk.substring(0,7) : monthVal;
                        let satsMonth = Object.keys(timeline[emp.name]).filter(d => d.startsWith(mStr) && new Date(d).getDay() === 6);
                        let satsFreeCount = satsMonth.filter(d => timeline[emp.name][d] !== "Work").length;

                        if(emp.satRule && satsFreeCount < 2 && satOfWk && timeline[emp.name][satOfWk] === "Work") {
                            timeline[emp.name][satOfWk] = "Frei";
                        } else {
                            // Wochentag finden (Rotation + Besetzung)
                            let bestD = null, maxBes = -1;
                            daysOfWk.filter(d => new Date(d).getDay() <= 5 && timeline[emp.name][d] === "Work").forEach(d => {
                                let schonFrei = employees.filter(e => ["Frei", "Wunschfrei"].includes(timeline[e.name][d])).length;
                                if(schonFrei === 0) { // Priorität: Niemand sonst frei!
                                    let bes = employees.filter(e => timeline[e.name][d] === "Work").length;
                                    if(bes > maxBes) { maxBes = bes; bestD = d; }
                                }
                            });
                            // Fallback falls alle Tage schon 1x frei haben: Nimm den Tag mit den meisten Leuten
                            if(!bestD) {
                                daysOfWk.filter(d => new Date(d).getDay() <= 5 && timeline[emp.name][d] === "Work").forEach(d => {
                                    let bes = employees.filter(e => timeline[e.name][d] === "Work").length;
                                    if(bes > maxBes) { maxBes = bes; bestD = d; }
                                });
                            }
                            if(bestD) timeline[emp.name][bestD] = "Frei";
                        }
                    }
                });
            });

            // 3. SCHICHTEN (F/S)
            Object.keys(timeline[employees[0].name]).forEach(dStr => {
                let working = employees.filter(e => timeline[e.name][dStr] === "Work");
                if(working.length > 0) {
                    let d = new Date(dStr);
                    if(d.getDay() === 6) working.forEach(e => timeline[e.name][dStr] = "F");
                    else {
                        let wn = getISOWeek(d);
                        working.forEach(e => {
                            let idx = employees.indexOf(e);
                            timeline[e.name][dStr] = ((idx + wn) % 2 === 0) ? "F" : "S";
                        });
                        // Mindestbesetzung & 3-Mann-Regel
                        let sTeam = working.filter(e => timeline[e.name][dStr] === "S");
                        let fTeam = working.filter(e => timeline[e.name][dStr] === "F");
                        if(working.length === 3) {
                            working.forEach((e, i) => timeline[e.name][dStr] = (i === 0 ? "F" : "S"));
                        } else {
                            while(sTeam.length < settings.minSpaet && fTeam.length > 1) {
                                let mover = fTeam.pop(); timeline[mover.name][dStr] = "S"; sTeam.push(mover);
                            }
                        }
                    }
                }
            });

            // 4. ANZEIGE-DATEN
            let display = {}; let daysInM = new Date(year, month, 0).getDate();
            employees.forEach(e => {
                display[e.name] = [];
                for(let i=1; i<=daysInM; i++) {
                    let dStr = `${year}-${String(month).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    display[e.name].push({ day: i, status: timeline[e.name][dStr] });
                }
            });

            currentGeneratedPlan = { monthVal, plan: display, fullTimeline: timeline, daysInMonth: daysInM };
            document.getElementById('plan-result-container').style.display = "block";
            renderTables(display, daysInM, 'plan-table-wrapper', 'hours-table-wrapper');

        } catch (e) { errBox.innerText = "Fehler: " + e.message; errBox.style.display = "block"; }
    }

    function renderTables(pData, dInM, pId, hId) {
        let html = `<table class="plan-table main-plan-table"><thead><tr><th>Team</th>`;
        for(let d=1; d<=dInM; d++) html += `<th>${d}</th>`;
        html += `</tr></thead><tbody>`;
        employees.forEach(emp => {
            html += `<tr><td style="text-align:left;">${emp.name}</td>`;
            pData[emp.name].forEach(d => {
                let c = "", s = d.status;
                if(s === "F") c = "cell-frueh"; else if(s === "S") c = "cell-spaet"; 
                else if(s === "Feiertag") { c = "cell-feiertag"; s = "FT"; }
                else if(s === "Urlaub") { c = "cell-urlaub"; s = "U"; }
                else if(s === "Krank") { c = "cell-krank"; s = "K"; }
                else if(s.includes("Frei")) { c = "cell-frei"; s = "F"; }
                else if(s.includes("So")) { c = "cell-we"; s = "-"; }
                html += `<td class="${c}">${s}</td>`;
            });
            html += `</tr>`;
        });
        document.getElementById(pId).innerHTML = html + "</tbody></table>";

        let hHtml = `<table class="plan-table hours-table"><thead><tr><th>Name</th><th>Soll</th><th>Ist</th></tr></thead><tbody>`;
        employees.forEach(emp => {
            let ist = pData[emp.name].filter(d => ["F","S"].includes(d.status)).length * 8;
            let ft = pData[emp.name].filter(d => d.status === "Feiertag").length * 8;
            hHtml += `<tr><td>${emp.name}</td><td>160</td><td>${ist + ft}</td></tr>`;
        });
        document.getElementById(hId).innerHTML = hHtml + "</tbody></table>";
    }

    function saveCurrentPlan() {
        if(!currentGeneratedPlan) return;
        savedPlans[currentGeneratedPlan.monthVal] = currentGeneratedPlan;
        localStorage.setItem('saved_plans', JSON.stringify(savedPlans));
        alert("Plan archiviert!"); renderArchiv();
    }

    function renderArchiv() {
        const l = document.getElementById('saved-plans-list'); l.innerHTML = '';
        Object.keys(savedPlans).sort().forEach(m => {
            l.innerHTML += `<div class="employee-item"><strong>Plan: ${m}</strong><div><button onclick="viewPlan('${m}')" style="color:var(--primary);margin-right:10px;">Öffnen</button><button class="delete-btn" onclick="deletePlan('${m}')">Löschen</button></div></div>`;
        });
    }

    function viewPlan(m) {
        const d = savedPlans[m]; document.getElementById('saved-plan-view').style.display='block';
        renderTables(d.plan, d.daysInMonth, 'saved-plan-table-wrapper', 'saved-hours-table-wrapper');
        window.scrollTo(0, document.getElementById('saved-plan-view').offsetTop);
    }

    function deletePlan(m) { if(confirm("Löschen?")) { delete savedPlans[m]; localStorage.setItem('saved_plans', JSON.stringify(savedPlans)); renderArchiv(); } }

    renderEmployees(); renderAbsences(); renderArchiv(); loadSettingsToForm();
  </script>
</body>
</html>
